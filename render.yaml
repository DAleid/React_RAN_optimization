services:
  - type: web
    name: 5g-intent-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python api/intent.py
    envVars:
      - key: GROQ_API_KEY
        sync: false          # set manually in Render dashboard
      - key: LLM_PROVIDER
        value: groq
    plan: free
